<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陌言后台管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #c0d0ff;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #1a2632 100%);
            color: white;
            transition: all 0.3s;
            z-index: 100;
        }
        .sidebar-header {
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h3 {
            font-size: 20px;
            margin: 0;
        }
        .sidebar-header p {
            font-size: 12px;
            opacity: 0.7;
            margin: 8px 0 0;
        }
        .nav-menu {
            padding: 20px 0;
        }
        .nav-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .nav-item.active {
            background: rgba(255,255,255,0.2);
            border-left: 4px solid #7488ea;
        }
        .nav-item i {
            font-size: 20px;
            width: 24px;
        }
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }
        .top-bar {
            background: white;
            border-radius: 12px;
            padding: 15px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }
        .admin-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logout-btn {
            color: #e74c3c;
            cursor: pointer;
            text-decoration: none;
        }
        .iframe-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-height: calc(100vh - 120px);
        }
        iframe {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>📖 陌言</h3>
            <p>内容管理后台</p>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-page="dashboard">
                <i class="bi bi-speedometer2"></i>
                <span>仪表盘</span>
            </div>
            <div class="nav-item" data-page="posts">
                <i class="bi bi-file-text"></i>
                <span>帖子审核</span>
                <span class="badge bg-danger ms-auto" id="pendingPostsBadge" style="display:none">0</span>
            </div>
            <div class="nav-item" data-page="replies">
                <i class="bi bi-chat"></i>
                <span>回复审核</span>
                <span class="badge bg-danger ms-auto" id="pendingRepliesBadge" style="display:none">0</span>
            </div>
            <div class="nav-item" data-page="reports">
                <i class="bi bi-flag"></i>
                <span>举报处理</span>
                <span class="badge bg-danger ms-auto" id="pendingReportsBadge" style="display:none">0</span>
            </div>
            <div class="nav-item" data-page="users">
                <i class="bi bi-people"></i>
                <span>用户管理</span>
            </div>
            <div class="nav-item" data-page="tasks">
                <i class="bi bi-calendar-check"></i>
                <span>互动任务</span>
            </div>
            <div class="nav-item" data-page="publishers">
                <i class="bi bi-building"></i>
                <span>出版社管理</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title" id="pageTitle">仪表盘</div>
            <div class="admin-info">
                <span><i class="bi bi-person-circle"></i> <span id="adminName"></span></span>
                <a class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出</a>
            </div>
        </div>
        <div class="iframe-container">
            <iframe id="contentFrame" src="pages/dashboard.html"></iframe>
        </div>
    </div>

    <script>
        // 登录检查
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        document.getElementById('adminName').textContent = sessionStorage.getItem('adminName') || '管理员';

        const pages = {
            dashboard: { title: '仪表盘', url: 'pages/dashboard.html' },
            posts: { title: '帖子审核', url: 'pages/posts.html' },
            replies: { title: '回复审核', url: 'pages/replies.html' },
            reports: { title: '举报处理', url: 'pages/reports.html' },
            users: { title: '用户管理', url: 'pages/users.html' },
            tasks: { title: '互动任务管理', url: 'pages/tasks.html' },
            publishers: { title: '出版社管理', url: 'pages/publishers.html' }
        };

        function loadPage(pageId) {
            const page = pages[pageId];
            if (page) {
                document.getElementById('pageTitle').textContent = page.title;
                document.getElementById('contentFrame').src = page.url;
                
                // 更新导航高亮
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.getAttribute('data-page') === pageId) {
                        item.classList.add('active');
                    }
                });
            }
        }

        // 导航点击事件
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const pageId = this.getAttribute('data-page');
                loadPage(pageId);
            });
        });

        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // 定期刷新待处理数量
        function loadPendingCounts() {
            // 实际项目中调用API获取数量
            // fetch('/api/admin/pending-counts')
            //   .then(res => res.json())
            //   .then(data => {
            //       updateBadge('pendingPostsBadge', data.posts);
            //       updateBadge('pendingRepliesBadge', data.replies);
            //       updateBadge('pendingReportsBadge', data.reports);
            //   });
        }
        
        function updateBadge(badgeId, count) {
            const badge = document.getElementById(badgeId);
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }
        
        loadPendingCounts();
        setInterval(loadPendingCounts, 30000);
    </script>
</body>
</html>
