<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动任务管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .task-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .task-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .type-continue { background: #e3f2fd; color: #1976d2; }
        .type-rewrite { background: #fff3e0; color: #f57c00; }
        .type-optimize { background: #e8f5e9; color: #388e3c; }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4>每日互动任务管理</h4>
            <button class="btn btn-primary" onclick="openCreateModal()">
                <i class="bi bi-plus"></i> 发布新任务
            </button>
        </div>
        
        <div id="tasksList"></div>
        
        <!-- 创建/编辑任务弹窗 -->
        <div class="modal fade" id="taskModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="taskModalTitle">发布任务</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">任务类型</label>
                            <select class="form-select" id="taskType">
                                <option value="1">续写任务</option>
                                <option value="2">改写任务</option>
                                <option value="3">优化任务</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">标题</label>
                            <input type="text" class="form-control" id="taskTitle" placeholder="请输入任务标题">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">任务内容</label>
                            <textarea class="form-control" id="taskContent" rows="4" placeholder="请提供续写/改写/优化的原文内容"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="publishTask()">发布</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 查看回答弹窗 -->
        <div class="modal fade" id="answersModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">任务回答列表</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="answersList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let tasks = [];
        let taskModal = null;
        let answersModal = null;
        
        const mockTasks = [
            { taskId: 1, taskType: 1, title: '续写《雨夜》', content: '窗外的雨淅淅沥沥地下着，我坐在窗前，望着模糊的玻璃...', publishDate: '2024-04-01', isActive: true, answerCount: 15 },
            { taskId: 2, taskType: 2, title: '改写这段话', content: '今天天气很好，我很开心。', publishDate: '2024-03-31', isActive: true, answerCount: 23 },
            { taskId: 3, taskType: 3, title: '优化这段文字', content: '他是一个好人，他帮助了很多人。', publishDate: '2024-03-30', isActive: false, answerCount: 8 }
        ];
        
        function loadTasks() {
            tasks = [...mockTasks];
            renderTasks();
        }
        
        function renderTasks() {
            const container = document.getElementById('tasksList');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="text-center text-muted" style="padding: 60px;">暂无任务</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => {
                let typeClass = '';
                let typeName = '';
                switch(task.taskType) {
                    case 1: typeClass = 'type-continue'; typeName = '续写任务'; break;
                    case 2: typeClass = 'type-rewrite'; typeName = '改写任务'; break;
                    case 3: typeClass = 'type-optimize'; typeName = '优化任务'; break;
                }
                return `
                    <div class="task-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="task-type ${typeClass}">${typeName}</span>
                                <h5 class="mt-2">${escapeHtml(task.title)}</h5>
                                <p class="text-muted mt-2">${escapeHtml(task.content)}</p>
                                <div class="mt-2 text-muted small">
                                    <span>发布日期: ${task.publishDate}</span>
                                    <span class="ms-3">参与人数: ${task.answerCount}</span>
                                </div>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-outline-info" onclick="viewAnswers(${task.taskId})">查看回答</button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="toggleTaskStatus(${task.taskId})">
                                    ${task.isActive ? '停用' : '启用'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function openCreateModal() {
            document.getElementById('taskModalTitle').textContent = '发布新任务';
            document.getElementById('taskType').value = '1';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskContent').value = '';
            taskModal.show();
        }
        
        function publishTask() {
            const taskType = parseInt(document.getElementById('taskType').value);
            const title = document.getElementById('taskTitle').value;
            const content = document.getElementById('taskContent').value;
            
            if (!title || !content) {
                alert('请填写完整信息');
                return;
            }
            
            const newTask = {
                taskId: Date.now(),
                taskType: taskType,
                title: title,
                content: content,
                publishDate: new Date().toISOString().split('T')[0],
                isActive: true,
                answerCount: 0
            };
            
            tasks.unshift(newTask);
            renderTasks();
            taskModal.hide();
            alert('任务发布成功');
        }
        
        function toggleTaskStatus(taskId) {
            const task = tasks.find(t => t.taskId === taskId);
            if (task) {
                task.isActive = !task.isActive;
                renderTasks();
                alert(`任务已${task.isActive ? '启用' : '停用'}`);
            }
        }
        
        function viewAnswers(taskId) {
            // 实际调用API获取回答列表
            const mockAnswers = [
                { userId: 101, nickname: '诗人小张', content: '雨滴敲打着窗棂，像是在诉说一个古老的故事...', score: 45, submitTime: '2024-04-01 14:30' },
                { userId: 102, nickname: '夜行者', content: '夜已深，雨未停，思念如潮水般涌来...', score: 38, submitTime: '2024-04-01 13:20' },
                { userId: 103, nickname: '小确幸', content: '这场雨，洗去了尘埃，也洗净了心灵...', score: 32, submitTime: '2024-04-01 12:15' }
            ];
            
            const answersHtml = `
                <div class="list-group">
                    ${mockAnswers.map(answer => `
                        <div class="list-group-item">
                            <div class="d-flex justify-content-between">
                                <strong>${escapeHtml(answer.nickname)}</strong>
                                <span class="badge bg-primary">评分: ${answer.score}</span>
                            </div>
                            <p class="mt-2">${escapeHtml(answer.content)}</p>
                            <small class="text-muted">${answer.submitTime}</small>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('answersList').innerHTML = answersHtml;
            answersModal.show();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
        answersModal = new bootstrap.Modal(document.getElementById('answersModal'));
        loadTasks();
    </script>
</body>
</html>
