<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>举报处理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .report-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .target-content {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
        }
        .reason {
            color: #e67e22;
            margin: 8px 0;
        }
        .btn-group-sm {
            gap: 8px;
        }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <div class="tabs" style="margin-bottom: 20px; border-bottom: 2px solid #e0e0e0;">
            <div class="tab active" data-status="0" style="display: inline-block; padding: 10px 20px; cursor: pointer;">待处理 (<span id="pendingCount">0</span>)</div>
            <div class="tab" data-status="1" style="display: inline-block; padding: 10px 20px; cursor: pointer;">已处理</div>
            <div class="tab" data-status="2" style="display: inline-block; padding: 10px 20px; cursor: pointer;">已驳回</div>
        </div>
        
        <div id="reportsList"></div>
    </div>

    <script>
        let currentStatus = 0;
        
        const mockReports = {
            0: [
                { reportId: 1, reporterId: 201, targetType: 1, targetId: 4, 
                  targetContent: '买xxxx加微信，价格优惠...', targetTitle: '广告帖',
                  reason: '广告推广，与平台内容无关', reportTime: '2024-04-01 09:00',
                  reporterNickname: '热心用户' },
                { reportId: 2, reporterId: 202, targetType: 2, targetId: 15,
                  targetContent: '你写的什么垃圾东西，完全看不懂', targetTitle: '回复内容',
                  reason: '人身攻击，不友善言论', reportTime: '2024-04-01 08:30',
                  reporterNickname: '文学爱好者' }
            ],
            1: [],
            2: []
        };
        
        function loadReports() {
            const reports = mockReports[currentStatus] || [];
            document.getElementById('pendingCount').textContent = mockReports[0].length;
            renderReports(reports);
        }
        
        function renderReports(reports) {
            const container = document.getElementById('reportsList');
            if (reports.length === 0) {
                container.innerHTML = '<div class="text-center text-muted" style="padding: 60px;">暂无举报</div>';
                return;
            }
            
            container.innerHTML = reports.map(report => `
                <div class="report-card">
                    <div class="report-header">
                        <span><i class="bi bi-person"></i> 举报人: ${report.reporterNickname}</span>
                        <span><i class="bi bi-clock"></i> ${report.reportTime}</span>
                    </div>
                    <div><strong>被举报类型:</strong> ${report.targetType === 1 ? '帖子' : '回复'}</div>
                    <div class="target-content">
                        <strong>原标题/内容:</strong><br>
                        ${escapeHtml(report.targetTitle)}<br>
                        ${escapeHtml(report.targetContent)}
                    </div>
                    <div class="reason"><i class="bi bi-exclamation-triangle"></i> 举报理由: ${escapeHtml(report.reason)}</div>
                    <div class="btn-group-sm mt-3">
                        <button class="btn btn-danger btn-sm" onclick="handleReport(${report.reportId}, 'remove')">撤下内容并警告</button>
                        <button class="btn btn-warning btn-sm" onclick="handleReport(${report.reportId}, 'warn')">仅警告</button>
                        <button class="btn btn-secondary btn-sm" onclick="handleReport(${report.reportId}, 'reject')">驳回举报</button>
                    </div>
                </div>
            `).join('');
        }
        
        function handleReport(reportId, action) {
            let msg = '';
            switch(action) {
                case 'remove':
                    msg = '已撤下内容并警告用户';
                    break;
                case 'warn':
                    msg = '已警告用户';
                    break;
                case 'reject':
                    msg = '已驳回举报';
                    break;
            }
            alert(msg);
            // 实际调用API处理
            const report = mockReports[currentStatus].find(r => r.reportId === reportId);
            if (report) {
                if (action === 'reject') {
                    mockReports[2].push(report);
                } else {
                    mockReports[1].push(report);
                }
                mockReports[currentStatus] = mockReports[currentStatus].filter(r => r.reportId !== reportId);
            }
            loadReports();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // 标签页切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentStatus = parseInt(this.getAttribute('data-status'));
                loadReports();
            });
        });
        
        loadReports();
    </script>
</body>
</html>
