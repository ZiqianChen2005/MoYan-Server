<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        .user-table {
            width: 100%;
        }
        .user-table th, .user-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        .warning-badge {
            background: #f39c12;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .banned-badge {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .vip-badge {
            background: #9b59b6;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div style="padding: 20px;">
        <div class="search-bar">
            <input type="text" class="form-control" id="searchInput" placeholder="搜索用户昵称或手机号" style="width: 300px;">
            <button class="btn btn-primary" onclick="searchUser()">搜索</button>
            <button class="btn btn-outline-secondary" onclick="loadUsers()">重置</button>
        </div>
        
        <table class="user-table">
            <thead>
                <tr>
                    <th>用户ID</th>
                    <th>昵称</th>
                    <th>手机号</th>
                    <th>状态</th>
                    <th>警告次数</th>
                    <th>会员状态</th>
                    <th>注册时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
        
        <!-- 警告弹窗 -->
        <div class="modal fade" id="warnModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">警告用户</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>用户: <span id="warnUserName"></span></p>
                        <div class="mb-3">
                            <label class="form-label">当前警告次数: <span id="currentWarnCount"></span></label>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">警告原因</label>
                            <textarea class="form-control" id="warnReason" rows="2"></textarea>
                        </div>
                        <div class="alert alert-warning">
                            第3次警告将自动封禁用户
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-warning" onclick="confirmWarn()">确认警告</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 封禁弹窗 -->
        <div class="modal fade" id="banModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">封禁用户</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>用户: <span id="banUserName"></span></p>
                        <div class="mb-3">
                            <label class="form-label">封禁原因</label>
                            <textarea class="form-control" id="banReason" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" onclick="confirmBan()">确认封禁</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let users = [];
        let currentUserId = null;
        let warnModal = null;
        let banModal = null;
        
        const mockUsers = [
            { userId: 1, nickname: '诗人小张', phone: '138****0001', warningCount: 0, isBanned: false, isVip: false, vipExpireDate: null, registerTime: '2024-03-01' },
            { userId: 2, nickname: '夜行者', phone: '138****0002', warningCount: 1, isBanned: false, isVip: true, vipExpireDate: '2024-05-01', registerTime: '2024-03-05' },
            { userId: 3, nickname: '营销号', phone: '138****0003', warningCount: 2, isBanned: false, isVip: false, vipExpireDate: null, registerTime: '2024-03-10' },
            { userId: 4, nickname: '违规用户', phone: '138****0004', warningCount: 3, isBanned: true, isVip: false, vipExpireDate: null, registerTime: '2024-03-15' }
        ];
        
        function loadUsers() {
            users = [...mockUsers];
            renderUsers(users);
        }
        
        function renderUsers(userList) {
            const tbody = document.getElementById('userList');
            if (userList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">暂无用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = userList.map(user => `
                <tr>
                    <td>${user.userId}</td>
                    <td>${escapeHtml(user.nickname)}</td>
                    <td>${user.phone}</td>
                    <td>
                        ${user.isBanned ? '<span class="banned-badge">已封禁</span>' : '<span class="text-success">正常</span>'}
                    </td>
                    <td>
                        ${user.warningCount > 0 ? `<span class="warning-badge">${user.warningCount}次</span>` : '0次'}
                    </td>
                    <td>
                        ${user.isVip ? `<span class="vip-badge">VIP至 ${user.vipExpireDate}</span>` : '普通用户'}
                    </td>
                    <td>${user.registerTime}</td>
                    <td>
                        ${!user.isBanned ? `
                            <button class="btn btn-sm btn-warning" onclick="openWarnModal(${user.userId})">警告</button>
                            <button class="btn btn-sm btn-danger" onclick="openBanModal(${user.userId})">封禁</button>
                        ` : `
                            <button class="btn btn-sm btn-success" onclick="unbanUser(${user.userId})">解封</button>
                        `}
                    </td>
                </tr>
            `).join('');
        }
        
        function searchUser() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = users.filter(u => 
                u.nickname.toLowerCase().includes(keyword) || 
                u.phone.includes(keyword)
            );
            renderUsers(filtered);
        }
        
        function openWarnModal(userId) {
            const user = users.find(u => u.userId === userId);
            if (user) {
                currentUserId = userId;
                document.getElementById('warnUserName').textContent = user.nickname;
                document.getElementById('currentWarnCount').textContent = user.warningCount;
                document.getElementById('warnReason').value = '';
                warnModal.show();
            }
        }
        
        function confirmWarn() {
            const reason = document.getElementById('warnReason').value;
            const user = users.find(u => u.userId === currentUserId);
            if (user) {
                user.warningCount++;
                if (user.warningCount >= 3) {
                    user.isBanned = true;
                    alert(`用户 ${user.nickname} 已累计3次警告，自动封禁`);
                } else {
                    alert(`已警告用户 ${user.nickname}，当前警告次数: ${user.warningCount}`);
                }
                renderUsers(users);
            }
            warnModal.hide();
        }
        
        function openBanModal(userId) {
            const user = users.find(u => u.userId === userId);
            if (user) {
                currentUserId = userId;
                document.getElementById('banUserName').textContent = user.nickname;
                document.getElementById('banReason').value = '';
                banModal.show();
            }
        }
        
        function confirmBan() {
            const reason = document.getElementById('banReason').value;
            const user = users.find(u => u.userId === currentUserId);
            if (user) {
                user.isBanned = true;
                alert(`已封禁用户 ${user.nickname}`);
                renderUsers(users);
            }
            banModal.hide();
        }
        
        function unbanUser(userId) {
            const user = users.find(u => u.userId === userId);
            if (user) {
                user.isBanned = false;
                user.warningCount = 0;
                alert(`已解封用户 ${user.nickname}`);
                renderUsers(users);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        warnModal = new bootstrap.Modal(document.getElementById('warnModal'));
        banModal = new bootstrap.Modal(document.getElementById('banModal'));
        loadUsers();
    </script>
</body>
</html>
