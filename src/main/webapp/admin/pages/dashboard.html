<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .dashboard-container {
            padding: 20px;
        }
        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .stat-icon.blue { background: #e3f2fd; color: #1976d2; }
        .stat-icon.green { background: #e8f5e9; color: #388e3c; }
        .stat-icon.orange { background: #fff3e0; color: #f57c00; }
        .stat-icon.purple { background: #f3e5f5; color: #7b1fa2; }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        .stat-trend {
            font-size: 12px;
            margin-top: 8px;
        }
        .trend-up { color: #4caf50; }
        .trend-down { color: #f44336; }
        /* 图表行 */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .chart-container {
            height: 300px;
        }
        /* 待处理列表 */
        .pending-list {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pending-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .pending-item:last-child {
            border-bottom: none;
        }
        .pending-info {
            flex: 1;
        }
        .pending-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .pending-meta {
            font-size: 12px;
            color: #999;
        }
        .pending-badge {
            background: #ff9800;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        .btn-link-sm {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
        }
        .btn-link-sm:hover {
            text-decoration: underline;
        }
        /* 近期趋势 */
        .trend-list {
            margin-top: 20px;
        }
        .trend-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .trend-tag {
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .trend-count {
            font-weight: 600;
            color: #667eea;
        }
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="bi bi-file-text"></i>
                </div>
                <div class="stat-value" id="totalPosts">0</div>
                <div class="stat-label">总帖数</div>
                <div class="stat-trend trend-up">
                    <i class="bi bi-arrow-up"></i> 较昨日 +12%
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="bi bi-people"></i>
                </div>
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
                <div class="stat-trend trend-up">
                    <i class="bi bi-arrow-up"></i> 较昨日 +8%
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="bi bi-chat-dots"></i>
                </div>
                <div class="stat-value" id="totalReplies">0</div>
                <div class="stat-label">总回复数</div>
                <div class="stat-trend trend-up">
                    <i class="bi bi-arrow-up"></i> 较昨日 +15%
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="bi bi-flag"></i>
                </div>
                <div class="stat-value" id="pendingReports">0</div>
                <div class="stat-label">待处理举报</div>
                <div class="stat-trend trend-down">
                    <i class="bi bi-arrow-down"></i> 较昨日 -5%
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">
                    <i class="bi bi-graph-up"></i> 近7日发帖趋势
                </div>
                <div id="postTrendChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    <i class="bi bi-pie-chart"></i> 帖子类型分布
                </div>
                <div id="postTypeChart" class="chart-container"></div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">
                    <i class="bi bi-star"></i> 热门Tag TOP10
                </div>
                <div id="hotTagsChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    <i class="bi bi-trophy"></i> 活跃用户TOP10
                </div>
                <div id="activeUsersChart" class="chart-container"></div>
            </div>
        </div>

        <!-- 待处理事项 -->
        <div class="pending-list">
            <div class="section-title">
                <span><i class="bi bi-clock-history"></i> 待处理事项</span>
                <a href="#" class="btn-link-sm" onclick="parent.loadPage('reports')">查看全部 →</a>
            </div>
            <div id="pendingItems"></div>
        </div>

        <!-- 近期热门话题 -->
        <div class="pending-list mt-3">
            <div class="section-title">
                <span><i class="bi bi-fire"></i> 近期热门话题</span>
                <a href="#" class="btn-link-sm" onclick="parent.loadPage('posts')">查看更多 →</a>
            </div>
            <div id="hotTopics"></div>
        </div>
    </div>

    <script>
        // 模拟数据 - 实际项目中从API获取
        const mockData = {
            stats: {
                totalPosts: 1248,
                totalUsers: 356,
                totalReplies: 8920,
                pendingReports: 3
            },
            postTrend: {
                dates: ['03/25', '03/26', '03/27', '03/28', '03/29', '03/30', '03/31'],
                counts: [42, 38, 45, 52, 48, 56, 63]
            },
            postType: {
                types: ['诗歌', '散文', '小说', '随笔', '其他'],
                counts: [320, 280, 180, 150, 318]
            },
            hotTags: [
                { tag: '诗歌', count: 156 },
                { tag: '爱情', count: 98 },
                { tag: '现代诗', count: 87 },
                { tag: '散文', count: 76 },
                { tag: '青春', count: 65 },
                { tag: '励志', count: 54 },
                { tag: '古风', count: 48 },
                { tag: '哲理', count: 42 },
                { tag: '乡愁', count: 38 },
                { tag: '季节', count: 35 }
            ],
            activeUsers: [
                { nickname: '诗人小张', postCount: 28 },
                { nickname: '夜行者', postCount: 24 },
                { nickname: '小确幸', postCount: 21 },
                { nickname: '墨香', postCount: 18 },
                { nickname: '清风徐来', postCount: 16 },
                { nickname: '雨中漫步', postCount: 15 },
                { nickname: '星辰大海', postCount: 14 },
                { nickname: '笔尖少年', postCount: 13 },
                { nickname: '梦里花落', postCount: 12 },
                { nickname: '听雨', postCount: 11 }
            ],
            pendingItems: [
                { type: '帖子', title: '《关于AI写作的思考》', submitter: '匿名用户', time: '10分钟前', action: 'posts' },
                { type: '回复', title: '回复《秋日私语》', submitter: '游客123', time: '25分钟前', action: 'replies' },
                { type: '举报', title: '帖子《广告推广》被举报', submitter: '热心用户', time: '1小时前', action: 'reports' }
            ],
            hotTopics: [
                { title: '《春日即景》', author: '诗人小张', score: 98, replies: 45 },
                { title: '《深夜随笔》', author: '夜行者', score: 92, replies: 38 },
                { title: '《致青春》', author: '小确幸', score: 88, replies: 32 },
                { title: '《雨夜》', author: '听雨', score: 85, replies: 29 },
                { title: '《远方》', author: '星辰大海', score: 82, replies: 27 }
            ]
        };

        // 更新统计数据
        function updateStats() {
            document.getElementById('totalPosts').textContent = mockData.stats.totalPosts;
            document.getElementById('totalUsers').textContent = mockData.stats.totalUsers;
            document.getElementById('totalReplies').textContent = mockData.stats.totalReplies;
            document.getElementById('pendingReports').textContent = mockData.stats.pendingReports;
        }

        // 渲染发帖趋势图
        function renderPostTrendChart() {
            const chart = echarts.init(document.getElementById('postTrendChart'));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { top: 30, left: 40, right: 20, bottom: 20 },
                xAxis: {
                    type: 'category',
                    data: mockData.postTrend.dates,
                    axisLabel: { fontSize: 11 }
                },
                yAxis: {
                    type: 'value',
                    name: '发帖数量'
                },
                series: [{
                    data: mockData.postTrend.counts,
                    type: 'line',
                    smooth: true,
                    lineStyle: { color: '#667eea', width: 3 },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(102,126,234,0.3)' },
                            { offset: 1, color: 'rgba(102,126,234,0.05)' }
                        ])
                    },
                    symbol: 'circle',
                    symbolSize: 8,
                    itemStyle: { color: '#667eea' }
                }]
            });
        }

        // 渲染帖子类型分布图
        function renderPostTypeChart() {
            const chart = echarts.init(document.getElementById('postTypeChart'));
            chart.setOption({
                tooltip: { trigger: 'item' },
                legend: { orient: 'vertical', left: 'left', top: 'center' },
                series: [{
                    type: 'pie',
                    radius: '55%',
                    center: ['50%', '50%'],
                    data: mockData.postType.types.map((name, idx) => ({
                        name, value: mockData.postType.counts[idx]
                    })),
                    emphasis: { scale: true },
                    label: { show: true, formatter: '{b}: {d}%' },
                    itemStyle: {
                        borderRadius: 8,
                        borderColor: '#fff',
                        borderWidth: 2
                    }
                }],
                color: ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#43e97b']
            });
        }

        // 渲染热门Tag图
        function renderHotTagsChart() {
            const chart = echarts.init(document.getElementById('hotTagsChart'));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { top: 20, left: 80, right: 20, bottom: 20 },
                xAxis: { type: 'value', name: '使用次数' },
                yAxis: {
                    type: 'category',
                    data: mockData.hotTags.map(t => t.tag).reverse(),
                    axisLabel: { fontSize: 11 }
                },
                series: [{
                    data: mockData.hotTags.map(t => t.count).reverse(),
                    type: 'bar',
                    barWidth: '60%',
                    itemStyle: {
                        borderRadius: [0, 4, 4, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#667eea' },
                            { offset: 1, color: '#764ba2' }
                        ])
                    }
                }]
            });
        }

        // 渲染活跃用户图
        function renderActiveUsersChart() {
            const chart = echarts.init(document.getElementById('activeUsersChart'));
            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { top: 20, left: 80, right: 20, bottom: 20 },
                xAxis: { type: 'value', name: '发帖数量' },
                yAxis: {
                    type: 'category',
                    data: mockData.activeUsers.map(u => u.nickname).reverse(),
                    axisLabel: { fontSize: 11 }
                },
                series: [{
                    data: mockData.activeUsers.map(u => u.postCount).reverse(),
                    type: 'bar',
                    barWidth: '60%',
                    itemStyle: {
                        borderRadius: [0, 4, 4, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#43e97b' },
                            { offset: 1, color: '#38f9d7' }
                        ])
                    }
                }]
            });
        }

        // 渲染待处理事项
        function renderPendingItems() {
            const container = document.getElementById('pendingItems');
            container.innerHTML = mockData.pendingItems.map(item => `
                <div class="pending-item">
                    <div class="pending-info">
                        <div class="pending-title">${escapeHtml(item.title)}</div>
                        <div class="pending-meta">
                            <span class="pending-badge">${item.type}</span>
                            <span class="ms-2">${escapeHtml(item.submitter)}</span>
                            <span class="ms-2">${item.time}</span>
                        </div>
                    </div>
                    <button class="btn btn-sm btn-outline-primary" onclick="parent.loadPage('${item.action}')">
                        处理 <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            `).join('');
        }

        // 渲染热门话题
        function renderHotTopics() {
            const container = document.getElementById('hotTopics');
            container.innerHTML = mockData.hotTopics.map(topic => `
                <div class="pending-item">
                    <div class="pending-info">
                        <div class="pending-title">${escapeHtml(topic.title)}</div>
                        <div class="pending-meta">
                            ${escapeHtml(topic.author)} · 评分 ${topic.score} · 回复 ${topic.replies}
                        </div>
                    </div>
                    <span class="text-muted">🔥 ${topic.score}</span>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 页面加载时初始化
        updateStats();
        renderPostTrendChart();
        renderPostTypeChart();
        renderHotTagsChart();
        renderActiveUsersChart();
        renderPendingItems();
        renderHotTopics();

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            echarts.init(document.getElementById('postTrendChart')).resize();
            echarts.init(document.getElementById('postTypeChart')).resize();
            echarts.init(document.getElementById('hotTagsChart')).resize();
            echarts.init(document.getElementById('activeUsersChart')).resize();
        });

        // 定时刷新数据（每30秒）
        setInterval(() => {
            // 实际项目中调用API刷新数据
            console.log('刷新仪表盘数据');
        }, 30000);
    </script>
</body>
</html>
